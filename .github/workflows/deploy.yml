name: deploy

# `test`: build across all 14 locales (onBrokenLinks/onBrokenAnchors: "throw"
# catches broken links) and run the a11y/SEO Playwright + unit suite. Runs on
# every push AND every pull_request, so a regression is caught before merge.
#
# `deploy`: on an actual push to main (or manual dispatch) only — never on a
# pull_request run, which has no AWS credentials — rebuilds (a fresh checkout,
# not the `test` job's artifact) and replaces the contents of the S3 website
# bucket, then invalidates the CloudFront cache. Bucket + distribution
# discovered from the live CloudFront config:
#   docs.dig.net -> CloudFront E1G7CFG1FDYG9Y -> origin docs-dig-net.s3-website-us-east-1.amazonaws.com
on:
  push:
    tags: ['v*']
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: docs-dig-net
  CLOUDFRONT_DISTRIBUTION_ID: E1G7CFG1FDYG9Y

jobs:
  test:
    name: build + a11y/SEO tests
    # PR gate only — a tag push is a release of an already-PR-gated `main` tip
    # (the merged tree already ran this full suite on the pull_request event),
    # so re-running it here would just re-test the same commit a second time
    # and gate the deploy behind it for no new signal (#488 release-blocker).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      # onBrokenLinks/onBrokenAnchors: "throw" (docusaurus.config.ts) means this
      # also fails the build on any broken link/anchor across all 14 locales.
      - run: npm run build # docusaurus build --out-dir dist; postbuild annotates sitemap hreflang
      # Machine-entry-point freshness gate (umbrella project's §6.6): fail
      # fast, before spinning up a browser, if llms.txt/sitemap.xml/
      # robots.txt didn't actually make it into the built output root.
      - name: verify llms.txt / sitemap.xml / robots.txt exist in the build output
        run: |
          set -euo pipefail
          test -s dist/llms.txt
          test -s dist/sitemap.xml
          test -s dist/robots.txt
          echo "llms.txt, sitemap.xml, robots.txt all present and non-empty in dist/"
      - run: npx playwright install --with-deps chromium
      # Unit suite (tests/unit/) needs the same dist/ the e2e suite serves —
      # both run after the build above, not before.
      - run: npm run test:unit
      # Named a11y gate (umbrella project's §6.6 — axe + ARIA-tree + keyboard
      # coverage), run as its own step so a WCAG regression is unambiguous in
      # the CI log; test:e2e below re-runs the same spec files as part of the
      # full suite (SEO/hreflang included), which is intentional redundancy
      # rather than duplicated cost — Playwright's own caching/parallelism
      # keeps the combined wall-clock small, and a11y failing on its own
      # step still fails the job before test:e2e's report replaces it.
      - run: npm run test:a11y
      - run: npm run test:e2e
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    name: build + sync + invalidate
    # No `needs: test` — the tag push that triggers this job releases a
    # commit already gated by the `test` job on its pull_request run; this
    # job only builds/packages/publishes (#488). Never deploy from a
    # pull_request run (no AWS credentials are available to a fork/PR context
    # anyway) — only an actual `v*` tag push, or a manual dispatch, publishes.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write # OIDC (assume the deploy role; no stored keys)
    # Serialize deploys so two runs never race on `s3 sync --delete`. Let an
    # in-flight sync finish. Job-scoped (not workflow-scoped) so concurrent
    # pull_request `test` runs are never queued behind or block a deploy.
    concurrency:
      group: docs-dignet-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build # docusaurus build --out-dir dist
      - name: configure aws (oidc)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ vars.CI_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: sync to S3 + invalidate CloudFront
        run: |
          set -euo pipefail
          aws s3 sync dist "s3://${S3_BUCKET}" --delete
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" --paths '/*'
